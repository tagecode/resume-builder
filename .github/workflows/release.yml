name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            artifact_glob: |
              release/**/*.dmg
              release/**/*.zip
          - os: windows-latest
            platform: win
            artifact_glob: |
              release/**/*.exe
          - os: ubuntu-latest
            platform: linux
            # upload-artifact 的 glob 不支持 {a,b} 花括号展开，需分行写多个模式
            artifact_glob: |
              release/**/*.AppImage
              release/**/*.deb

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 与 package.json 中 dist:mac / dist:win / dist:linux 对齐（原 yml 的 build:mac 等脚本不存在）
      - name: Build
        run: pnpm run dist:${{ matrix.platform }}
        env:
          # package.json 中 electron-builder 已设 publish: null，避免与 action-gh-release 重复发布
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-dist
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    # 仅 tag push 时创建 Release；workflow_dispatch 手动触发时跳过此 job（只构建产物）
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # download 后仍保留 release/<version>/ 等子目录，需用 ** 匹配
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.exe
            artifacts/**/*.AppImage
            artifacts/**/*.deb
          generate_release_notes: true
